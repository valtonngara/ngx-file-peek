name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build library
        run: npx ng build ngx-file-peek

      - name: Build demo for GitHub Pages
        run: npx ng build ngx-file-peek-demo --base-href /ngx-file-peek/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/ngx-file-peek-demo/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
